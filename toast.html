<!DOCTYPE html>
<html>

<head>
    <title>Contoh Toast Bootstrap Sederhana</title>

<body>

    <div class="container mt-5">

        <h3>Contoh Toast Bootstrap</h3>

        <!-- Toast -->
        <div class="toast show" data-autohide="false">
            <div class="toast-header">
                <strong class="mr-auto text-primary">Toast Header</strong>
                <small class="text-muted">5 menit lalu</small>
                <button type="button" class="ml-2 mb-1 close">&times;</button>
            </div>

            <div class="toast-body">
                Some text inside the toast body.
            </div>
        </div>

    </div>
